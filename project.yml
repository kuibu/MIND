name: MINDApps
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "15.0"
    macOS: "12.0"
settings:
  base:
    SWIFT_VERSION: 5.6
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
packages:
  MINDCore:
    path: .
targets:
  MINDiOSCapture:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - apps/ios-capture/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuibu.mind.ioscapture
        PRODUCT_NAME: MIND iOS Capture
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: apps/ios-capture/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: MINDCore
        product: MINDAppSupport

  MINDMacIngest:
    type: application
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - apps/mac-ingest/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kuibu.mind.macingest
        PRODUCT_NAME: MIND Mac Ingest
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MIND Ingest
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: MINDCore
        product: MINDAppSupport

schemes:
  MINDiOSCapture:
    build:
      targets:
        MINDiOSCapture: all
    run:
      config: Debug
  MINDMacIngest:
    build:
      targets:
        MINDMacIngest: all
    run:
      config: Debug
